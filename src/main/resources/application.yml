spring:
  application:
    name: online-course-platform
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/course_platform}
    username: ${SPRING_DATASOURCE_USERNAME:course_user}
    password: ${SPRING_DATASOURCE_PASSWORD:course_password}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always

app:
  jwt:
    secret: ${JWT_SECRET:change-this-demo-secret-change-this-demo-secret-change-this-demo-secret}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
  files:
    upload-dir: ${UPLOAD_DIR:data/uploads}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

logging:
  file:
    name: logs/course-platform.log
  level:
    root: INFO
    kz.baltabay.assel.courseplatform: DEBUG
    org.springframework.security: INFO

springdoc:
  swagger-ui:
    path: /swagger-ui.html
